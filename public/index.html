<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Табели</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!--HEADER-->

  <main class="container">
    <h1>Табели проверок</h1>

    <div class="buttons">
      <button id="btn-new">Новый табель</button>
      <button id="btn-report">Выгрузить табели</button>
      <button id="btn-log">Выгрузить лог</button>
    </div>

    <div id="timesheets-list" class="timesheets-grid"></div>

    <div class="danger-zone">
      <button id="btn-delete-all">Удалить все табели</button>
    </div>
  </main>

  <div class="scroll-buttons">
    <button id="btn-scroll-top" title="В начало">↑</button>
    <button id="btn-scroll-bottom" title="В конец">↓</button>
  </div>

  <!--FOOTER-->

  <script src="/main.js"></script>
</body>
</html>
