<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Табели</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!--HEADER-->

  <nav class="tab-bar">
    <button class="tab active" data-tab="today">Табели сегодня</button>
    <button class="tab" data-tab="past">Прошлые смены</button>
  </nav>

  <main class="container">
    <div id="tab-today" class="tab-content active">
      <div id="today-timesheets"></div>
    </div>
    <div id="tab-past" class="tab-content">
      <div id="past-shifts-list"></div>
    </div>
  </main>

  <div class="scroll-buttons">
    <button id="btn-scroll-top" title="В начало">↑</button>
    <button id="btn-scroll-bottom" title="В конец">↓</button>
  </div>

  <!--FOOTER-->

  <script src="/main.js"></script>
</body>
</html>
