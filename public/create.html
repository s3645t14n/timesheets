<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый табель</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Заголовок-ссылка на главную -->
  <header class="app-header"><a href="/">Демо-экзамен 2026</a></header>

  <div class="container">
    <h1>Новый табель</h1>
    <!-- Форма ввода метаданных -->
    <form id="create-form">
      <label>Время проверки</label>
      <select id="time" required></select>

      <label>ФИО проверяющего</label>
      <input type="text" id="inspector" required>

      <label>Номер рабочего места</label>
      <input type="text" id="workplace" required>

      <div class="buttons">
        <button type="button" id="btn-cancel">Отмена</button>
        <button type="submit" id="btn-create">Создать табель</button>
      </div>
    </form>
  </div>

  <!-- Футер со ссылкой на репозиторий -->
  <footer class="app-footer">
    <a href="https://github.com/s3645t14n/timesheets" target="_blank">github.com/s3645t14n/timesheets</a>
  </footer>

  <script src="/create.js"></script>
</body>
</html>
