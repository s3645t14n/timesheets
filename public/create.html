<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый табель</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!--HEADER-->

  <main class="container container-narrow">
    <h1>Новый табель</h1>
    <form id="create-form">
      <div class="form-fields">
        <label>ФИО проверяющего</label>
        <input type="text" id="inspector" required>
        <div class="field-error" id="error-inspector"></div>
      </div>

      <div class="buttons">
        <button type="button" id="btn-cancel">Отмена</button>
        <button type="submit" id="btn-create">Перейти к заполнению</button>
      </div>
    </form>
  </main>

  <!--FOOTER-->

  <script src="/create.js"></script>
</body>
</html>
