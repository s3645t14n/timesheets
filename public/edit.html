<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактирование табеля</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!--HEADER-->

  <main class="container container-narrow">
    <h1>Оценки</h1>
    <div id="meta"></div>
    <div id="criteria-list"></div>
  </main>

  <div class="scroll-buttons">
    <button id="btn-scroll-top" title="В начало">↑</button>
    <button id="btn-scroll-unfilled" title="К незаполненному">●</button>
    <button id="btn-scroll-bottom" title="В конец">↓</button>
  </div>

  <footer class="edit-footer" id="edit-footer">
    <span id="footer-score">Итог: 0 (0%) Оценка: —</span>
    <div class="footer-buttons">
      <button id="btn-back">Назад</button>
    </div>
  </footer>

  <script src="/edit.js"></script>
</body>
</html>
