<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ведомость</title>
  <link rel="stylesheet" href="/datatables/jquery.dataTables.min.css">
  <link rel="stylesheet" href="/datatables/buttons.dataTables.min.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { padding-top: 56px; }
    .dt-container { padding: 12px; }
    .dataTables_wrapper { overflow-x: auto; margin-top: 16px; }
    table { min-width: 600px; }

    .report-header {
      border-bottom: 2px solid #2c3e50;
      padding-bottom: 8px;
      margin-bottom: 8px;
    }

    .report-print-link {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }

    .report-print-link a {
      color: #2c3e50;
      font-weight: bold;
    }

    .dt-buttons {
      margin-bottom: 12px;
    }

    .dt-buttons .dt-button {
      background: #2c3e50;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 6px;
    }

    .dt-buttons .dt-button:hover {
      background: #1a252f;
    }
  </style>
</head>
<body>
  <!--HEADER-->

  <main class="container">
    <div class="report-header">
      <h1 id="report-title">Ведомость</h1>
    </div>
    <div class="report-print-link" id="print-link"></div>
    <table id="report-table" class="display" style="width:100%"></table>
    <div id="empty-message" class="empty" style="display:none; padding: 60px 0;"></div>
  </main>

  <script src="/datatables/jquery-3.7.0.min.js"></script>
  <script src="/datatables/jquery.dataTables.min.js"></script>
  <script src="/datatables/dataTables.buttons.min.js"></script>
  <script src="/datatables/buttons.html5.min.js"></script>
  <script src="/datatables/jszip.min.js"></script>
  <script src="/report-view.js"></script>
</body>
</html>
